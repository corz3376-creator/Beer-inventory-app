name: beer_logging_app
description: "A barrel logging inventory application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Architecture
  provider: ^6.1.2

  # Backend & Cloud Storage
  gsheets: ^0.4.0
  uuid: ^4.3.3

  # Local System Utilities (Required by your current files)
  path_provider: ^2.1.2
  sqflite: ^2.3.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
